    <!-- Brand engine: dot grid, aurora, real headline font, scroll animations -->
    <link rel="stylesheet" href="../shared.css?v=20260407k">

    <style>
        /* Center the nav logo */
        #nav .container { justify-content: center; }

        /* Center the footer logo (shared.css defaults to space-between) */
        footer .container { flex-direction: column; justify-content: center; align-items: center; gap: 14px; text-align: center; }

        /* Opt-in hero */
        .optin {
            position: relative; z-index: 2;
            min-height: calc(100vh - 80px);
            display: flex; align-items: center; justify-content: center;
            padding: 120px 28px 56px;
        }
        /* Desktop: cover spans the left column; headline (top) + form (bottom) sit right.
           Mobile: single column flows in source order — headline, cover, form. */
        .optin-grid {
            width: 100%; max-width: 1080px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            column-gap: clamp(32px, 5vw, 72px);
            row-gap: 18px;
            align-items: center;
        }
        .optin-h1 { grid-column: 2; grid-row: 1; align-self: end; }
        .lm-cover { grid-column: 1; grid-row: 1 / span 2; }
        .optin-form { grid-column: 2; grid-row: 2; align-self: start; }

        /* Headline */
        .optin-h1 {
            font-size: clamp(1.9rem, 3.4vw, 2.6rem); line-height: 1.14;
            letter-spacing: -0.02em; text-wrap: balance;
        }

        /* Cover */
        .lm-cover { display: flex; justify-content: center; }
        .lm-cover img {
            width: 100%; max-width: 420px; height: auto;
            border-radius: var(--r);
            box-shadow: 0 30px 70px rgba(0,0,0,0.18), 0 8px 20px rgba(0,0,0,0.08);
        }

        /* Sub + form */
        .optin-form .sub {
            font-size: clamp(1rem, 1.6vw, 1.15rem); color: var(--text-s);
            margin-bottom: 24px; max-width: 460px;
        }
        .form-frame {
            border: 2px solid var(--border); border-radius: var(--r);
            background: var(--bg-s); overflow: hidden;
        }
        .form-frame iframe { display: block; width: 100%; border: none; }

        /* TABLET / MOBILE: stack headline -> cover -> form */
        @media (max-width: 860px) {
            .optin { padding: 104px 24px 44px; min-height: auto; }
            .optin-grid { grid-template-columns: 1fr; row-gap: 22px; max-width: 480px; text-align: center; }
            .optin-h1, .lm-cover, .optin-form { grid-column: 1; grid-row: auto; }
            .optin-form .sub { margin-left: auto; margin-right: auto; }
            .lm-cover img { max-width: 240px; }
        }
    </style>
</head>
