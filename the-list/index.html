    <link rel="stylesheet" href="../shared.css?v=20260407k">

    <style>
        /* Center the nav logo */
        #nav .container { justify-content: center; }

        /* Center the footer logo (shared.css defaults to space-between) */
        footer .container { flex-direction: column; justify-content: center; align-items: center; gap: 14px; text-align: center; }

        /* Opt-in hero — single centered column (no lead-magnet asset) */
        .optin {
            position: relative; z-index: 2;
            min-height: calc(100vh - 80px);
            display: flex; align-items: flex-start; justify-content: center;
            padding: 132px 28px 56px;
        }
        .optin-inner {
            width: 100%; max-width: 600px;
            text-align: center;
        }

        /* Eyebrow */
        .optin-eyebrow {
            font-size: 0.82rem; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--text-s);
            margin-bottom: 18px;
        }

        /* Headline */
        .optin-h1 {
            font-size: clamp(2rem, 4.6vw, 3rem); line-height: 1.12;
            letter-spacing: -0.02em; text-wrap: balance;
            margin-bottom: 20px;
        }

        /* Sub */
        .optin-sub {
            font-size: clamp(0.92rem, 1.25vw, 1.02rem); line-height: 1.55;
            color: var(--text-s);
            margin: 0 auto 28px; max-width: 600px;
        }

        /* What you get — three quick proof lines */
        .optin-points {
            list-style: none; margin: 0 auto 30px; padding: 0;
            display: inline-flex; flex-direction: column; gap: 10px;
            text-align: left; max-width: 420px;
        }
        .optin-points li {
            display: flex; align-items: flex-start; gap: 11px;
            font-size: 0.98rem; color: var(--text);
        }
        .optin-points svg {
            flex: 0 0 auto; width: 19px; height: 19px; margin-top: 2px;
            stroke: var(--text); stroke-width: 2.4; fill: none;
        }

        /* Form */
        .form-frame {
            border: 2px solid var(--border); border-radius: var(--r);
            background: var(--bg-s); overflow: hidden;
            max-width: 440px; margin: 0 auto;
        }
        .form-frame iframe { display: block; width: 100%; border: none; }

        .optin-fineprint {
            margin-top: 16px; font-size: 0.8rem; color: var(--text-s);
        }

        @media (max-width: 860px) {
            .optin { padding: 104px 22px 44px; min-height: auto; }
        }
    </style>
</head>
