<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Call | JustScale</title>
    <meta name="description" content="Schedule a discovery call with JustScale. No pressure, no pitch. Just a conversation about what's possible.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <style>
        .book-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(12, 12, 12, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
        }
        .book-nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .book-nav-logo { display: flex; align-items: center; }
        .book-nav-logo img { height: 22px; width: auto; }
        .book-nav-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-s);
        }
        .book-hero { text-align: center; padding: 120px 0 20px; }
        .book-hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
        .book-hero p { color: rgba(255,255,255,0.6); font-size: 1.05rem; max-width: 500px; margin: 0 auto; }
        .book-calendly { max-width: 700px; margin: 0 auto; padding: 0 20px 60px; }
        .book-calendly .calendly-inline-widget { border-radius: 12px; overflow: hidden; }
        .book-footer {
            padding: 28px 0;
            border-top: 1px solid var(--border);
        }
        .book-footer .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .book-footer-logo img { height: 18px; width: auto; opacity: 0.5; }
        .book-footer-copy { font-size: 0.72rem; color: var(--text-m); }
        @media (max-width: 768px) {
            .book-hero { padding: 100px 0 10px; }
            .book-hero h1 { font-size: 1.6rem; }
            .book-footer .container { flex-direction: column; gap: 12px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="page" id="page">

    <nav class="book-nav">
        <div class="container">
            <a href="../index.html" class="book-nav-logo">
                <img src="../logo.svg" alt="JustScale">
            </a>
            <span class="book-nav-label">Discovery Call</span>
        </div>
    </nav>

    <div class="book-hero">
        <div class="container">
            <h1 class="sr">Book a discovery call.</h1>
            <p class="sr">Pick a time that works. No pressure, no pitch. Just a conversation about what's possible.</p>
        </div>
    </div>

    <div class="book-calendly">
        <div class="calendly-inline-widget" data-url="https://calendly.com/zac-justscale/justscale-discovery-call" style="min-width:320px;height:700px;"></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    </div>

    <footer class="book-footer">
        <div class="container">
            <a href="../index.html" class="book-footer-logo">
                <img src="../logo.svg" alt="JustScale">
            </a>
            <span class="book-footer-copy">&copy; 2026 JustScale. All rights reserved.</span>
        </div>
    </footer>

</div>

<script>
(function() {
    var page = document.getElementById('page');
    if (page) page.classList.add('loaded');
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.sr').forEach(function(el) { observer.observe(el); });
})();
</script>
</body>
</html>
